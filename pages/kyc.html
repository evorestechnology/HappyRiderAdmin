<div class="card">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2>Pending KYC Requests</h2>
        <button onclick="loadKycQueue()" class="btn-refresh">
            <i class="fas fa-sync-alt"></i> Refresh List
        </button>
    </div>

    <table class="kyc-table">
        <thead>
            <tr>
                <th>Mobile Number (User ID)</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="kyc-table-body">
            <tr>
                <td colspan="3" style="text-align: center; padding: 40px;">Syncing with Firestore...</td>
            </tr>
        </tbody>
    </table>
</div>

<div id="review-modal" class="modal-overlay">
    <div id="processing-loader" class="processing-overlay" style="display: none;">
        <div class="spinner"></div>
        <p>Updating Database...</p>
    </div>

    <div class="modal-content">
        <div class="modal-header">
            <h2 id="view-name">User Review</h2>
            <span class="close-btn" onclick="closeModal()">&times;</span>
        </div>

        <div class="modal-body">
            <div class="details-grid">
                <div class="detail-column">
                    <h4 class="section-title"><i class="fas fa-user"></i> Personal & Identity</h4>
                    <div id="personal-details-area"></div>

                    <h4 class="section-title" style="margin-top:20px;"><i class="fas fa-id-card"></i> Identity Documents
                    </h4>
                    <div id="id-docs-area"></div>
                </div>

                <div class="detail-column">
                    <h4 class="section-title"><i class="fas fa-motorcycle"></i> Vehicle Details</h4>
                    <div id="vehicle-details-area"></div>

                    <h4 class="section-title" style="margin-top:20px;"><i class="fas fa-users"></i> Family & Ownership
                    </h4>
                    <div id="family-details-area"></div>
                </div>
            </div>
        </div>

        <div class="modal-footer">
            <button class="btn-approve" onclick="confirmUpdate('accepted')">Approve Rider</button>
            <button class="btn-reject" onclick="rejectWithReason('rejected')">Reject</button>
            <button class="btn-block" onclick="rejectWithReason('blocked')">Block Account</button>
        </div>
    </div>
</div>

<style>
    /* Table Styles */
    .kyc-table {
        width: 100%;
        border-collapse: collapse;
    }

    .kyc-table th {
        background: #f4f7f6;
        padding: 12px;
        text-align: left;
        color: #666;
        font-size: 0.9rem;
    }

    .kyc-table td {
        padding: 15px 12px;
        border-bottom: 1px solid #eee;
    }

    .btn-refresh {
        background: #4b6344;
        color: white;
        border: none;
        padding: 8px 15px;
        border-radius: 5px;
        cursor: pointer;
    }

    /* Modal Styles */
    .modal-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.8);
        z-index: 9999;
    }

    .modal-content {
        background: white;
        width: 95%;
        max-width: 1100px;
        margin: 2% auto;
        border-radius: 12px;
        height: 90vh;
        display: flex;
        flex-direction: column;
        position: relative;
    }

    .modal-header {
        padding: 20px;
        border-bottom: 1px solid #eee;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .modal-body {
        padding: 20px;
        overflow-y: auto;
        flex-grow: 1;
    }

    .modal-footer {
        padding: 20px;
        border-top: 1px solid #eee;
        display: flex;
        justify-content: flex-end;
        gap: 10px;
    }

    /* Grid Layout */
    .details-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 30px;
    }

    .section-title {
        color: #4b6344;
        border-bottom: 2px solid #f0f0f0;
        padding-bottom: 8px;
        margin-bottom: 15px;
        font-size: 1rem;
    }

    .data-row {
        margin-bottom: 10px;
        font-size: 0.9rem;
    }

    .data-label {
        font-weight: 600;
        color: #777;
        width: 130px;
        display: inline-block;
    }

    .doc-img {
        width: 100%;
        border-radius: 8px;
        border: 1px solid #ddd;
        margin-top: 10px;
        cursor: pointer;
    }

    /* Buttons */
    .btn-approve {
        background: #28a745;
        color: white;
        border: none;
        padding: 12px 25px;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 600;
    }

    .btn-reject {
        background: #dc3545;
        color: white;
        border: none;
        padding: 12px 25px;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 600;
    }

    .btn-block {
        background: #333;
        color: white;
        border: none;
        padding: 12px 25px;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 600;
    }

    /* Loading Spinner */
    .processing-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(255, 255, 255, 0.9);
        z-index: 10001;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
    }

    .spinner {
        width: 50px;
        height: 50px;
        border: 5px solid #f3f3f3;
        border-top: 5px solid #4b6344;
        border-radius: 50%;
        animation: spin 1s linear infinite;
    }

    @keyframes spin {
        0% {
            transform: rotate(0deg);
        }

        100% {
            transform: rotate(360deg);
        }
    }
</style>

<script>
    var currentId = null;

    async function loadKycQueue() {
        const tableBody = document.getElementById('kyc-table-body');
        try {
            const snap = await db.collection('kyc').doc('categories').get();
            const pending = snap.data()?.pending || [];
            tableBody.innerHTML = pending.length ? "" : "<tr><td colspan='3' style='text-align:center;'>No pending requests.</td></tr>";

            pending.forEach(id => {
                tableBody.innerHTML += `
                    <tr>
                        <td><b>${id}</b></td>
                        <td><span style="color:#ef6c00; font-weight:600;">Pending Review</span></td>
                        <td><button onclick="reviewUser('${id}')" style="background:#4b6344; color:white; border:none; padding:6px 12px; border-radius:4px; cursor:pointer;">Review Details</button></td>
                    </tr>`;
            });
        } catch (e) { tableBody.innerHTML = "Error loading list."; }
    }

    async function reviewUser(id) {
        currentId = id;
        const doc = await db.collection('users').doc(id).get();
        const u = doc.data();

        document.getElementById('view-name').innerText = u.fullName || id;

        // Populate Personal
        document.getElementById('personal-details-area').innerHTML = `
            <div class="data-row"><span class="data-label">Full Name:</span> <span>${u.fullName}</span></div>
            <div class="data-row"><span class="data-label">Email:</span> <span>${u.email}</span></div>
            <div class="data-row"><span class="data-label">Mobile:</span> <span>${u.mobile}</span></div>
            <div class="data-row"><span class="data-label">DOB/Gender:</span> <span>${u.personalInfo?.dob} (${u.personalInfo?.gender})</span></div>
            <div class="data-row"><span class="data-label">City:</span> <span>${u.personalInfo?.userCity}</span></div>
        `;

        // Populate ID Docs
        document.getElementById('id-docs-area').innerHTML = `
            <div class="data-row"><span class="data-label">Selfie:</span></div>
            <img src="${u.personKycInfo?.selfie}" class="doc-img" onclick="window.open(this.src)">
            <div class="data-row" style="margin-top:10px;"><span class="data-label">Aadhaar:</span> <span>${u.personKycInfo?.aadhaar}</span></div>
            <img src="${u.personKycInfo?.aadhaarDoc}" class="doc-img" onclick="window.open(this.src)">
            <div class="data-row" style="margin-top:10px;"><span class="data-label">PAN:</span> <span>${u.personKycInfo?.pan}</span></div>
            <img src="${u.personKycInfo?.panDoc}" class="doc-img" onclick="window.open(this.src)">
            <div class="data-row" style="margin-top:10px;"><span class="data-label">License:</span> <span>${u.personKycInfo?.drivingLicense}</span></div>
            <img src="${u.personKycInfo?.drivingLicenseDoc}" class="doc-img" onclick="window.open(this.src)">
        `;

        // Populate Vehicle
        document.getElementById('vehicle-details-area').innerHTML = `
            <div class="data-row"><span class="data-label">Vehicle Type:</span> <span>${u.vehicleKycInfo?.vehicleType}</span></div>
            <div class="data-row"><span class="data-label">Make/Model:</span> <span>${u.vehicleKycInfo?.vehicleCompany} ${u.vehicleKycInfo?.vehicleModel}</span></div>
            <div class="data-row"><span class="data-label">Fuel Type:</span> <span>${u.vehicleKycInfo?.fuelType}</span></div>
            <div class="data-row"><span class="data-label">RC Number:</span> <span>${u.vehicleKycInfo?.rcNumber}</span></div>
            <img src="${u.vehicleKycInfo?.rcDoc}" class="doc-img" onclick="window.open(this.src)">
            <div style="display:flex; gap:5px; margin-top:10px;">
                <img src="${u.vehicleKycInfo?.vehicleImages?.front}" style="width:32%;" class="doc-img">
                <img src="${u.vehicleKycInfo?.vehicleImages?.back}" style="width:32%;" class="doc-img">
                <img src="${u.vehicleKycInfo?.vehicleImages?.side}" style="width:32%;" class="doc-img">
            </div>
        `;

        // Populate Family
        document.getElementById('family-details-area').innerHTML = `
            <div class="data-row"><span class="data-label">Ownership:</span> <span>${u.vehicleKycInfo?.ownershipType}</span></div>
            <div class="data-row"><span class="data-label">Owner Name:</span> <span>${u.vehicleKycInfo?.framilyInfo?.ownerName}</span></div>
            <div class="data-row"><span class="data-label">Relation:</span> <span>${u.vehicleKycInfo?.framilyInfo?.relationType}</span></div>
        `;

        document.getElementById('review-modal').style.display = 'block';
    }

    function closeModal() { document.getElementById('review-modal').style.display = 'none'; }

    function confirmUpdate(status) {
        if (confirm(`Are you sure you want to APPROVE rider ${currentId}?`)) {
            processAction(status);
        }
    }

    function rejectWithReason(status) {
        const reason = prompt(`Enter reason for ${status.toUpperCase()}:`);
        if (reason) processAction(status, reason);
    }

    async function processAction(status, reason = "") {
        const admin = localStorage.getItem('activeAdmin');
        const loader = document.getElementById('processing-loader');

        loader.style.display = 'flex'; // Show Spinner

        try {
            const batch = db.batch();
            const catRef = db.collection('kyc').doc('categories');
            const userRef = db.collection('users').doc(currentId);

            batch.update(catRef, {
                pending: firebase.firestore.FieldValue.arrayRemove(currentId),
                [status]: firebase.firestore.FieldValue.arrayUnion(`${currentId} (${admin})`)
            });

            batch.update(userRef, {
                kycStatus: status,
                kycReason: reason,
                verifiedBy: admin,
                verifiedAt: firebase.firestore.Timestamp.now()
            });

            await batch.commit();
            loader.style.display = 'none';
            closeModal();
            loadKycQueue();
        } catch (e) {
            loader.style.display = 'none';
            alert("Error updating record: " + e.message);
        }
    }

    loadKycQueue();
</script>
