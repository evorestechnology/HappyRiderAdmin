<div class="card">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2>Pending KYC Requests</h2>
        <button onclick="loadKycQueue()" class="btn-refresh">
            <i class="fas fa-sync-alt"></i> Refresh List
        </button>
    </div>

    <table class="kyc-table">
        <thead>
            <tr>
                <th>Mobile Number (User ID)</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="kyc-table-body">
            <tr>
                <td colspan="3" style="text-align: center; padding: 40px;">Syncing with Firestore...</td>
            </tr>
        </tbody>
    </table>
</div>

<div id="review-modal" class="modal-overlay">
    <div id="processing-loader" class="processing-overlay" style="display: none;">
        <div class="spinner"></div>
        <p id="loader-text">Fetching Records...</p>
    </div>

    <div class="modal-content">
        <div class="modal-header">
            <h2 id="view-name">User Review</h2>
            <span class="close-btn" onclick="closeModal()">&times;</span>
        </div>

        <div class="modal-body">
            <div class="details-grid">
                <div class="detail-column">
                    <h4 class="section-title"><i class="fas fa-user"></i> Personal Details</h4>
                    <div id="personal-details-area"></div>

                    <h4 class="section-title" style="margin-top:20px;"><i class="fas fa-map-marker-alt"></i> Location &
                        Address</h4>
                    <div id="address-details-area"></div>

                    <h4 class="section-title" style="margin-top:20px;"><i class="fas fa-id-card"></i> Identity Documents
                    </h4>
                    <div id="id-docs-area"></div>
                </div>

                <div class="detail-column">
                    <h4 class="section-title"><i class="fas fa-motorcycle"></i> Vehicle & Registration</h4>
                    <div id="vehicle-details-area"></div>

                    <h4 class="section-title" style="margin-top:20px;"><i class="fas fa-file-contract"></i> Ownership &
                        Agreement</h4>
                    <div id="ownership-details-area"></div>

                    <h4 class="section-title" style="margin-top:20px;"><i class="fas fa-history"></i> Submission Status
                    </h4>
                    <div id="status-details-area"></div>
                </div>
            </div>
        </div>

        <div class="modal-footer">
            <button class="btn-approve" onclick="confirmUpdate('accepted')">Approve Rider</button>
            <button class="btn-reject" onclick="rejectWithReason('rejected')">Reject</button>
            <button class="btn-block" onclick="rejectWithReason('blocked')">Block Account</button>
        </div>
    </div>
</div>

<style>
    .kyc-table {
        width: 100%;
        border-collapse: collapse;
    }

    .kyc-table th {
        background: #f4f7f6;
        padding: 12px;
        text-align: left;
        color: #666;
        font-size: 0.9rem;
    }

    .kyc-table td {
        padding: 15px 12px;
        border-bottom: 1px solid #eee;
    }

    .btn-refresh {
        background: #4b6344;
        color: white;
        border: none;
        padding: 8px 15px;
        border-radius: 5px;
        cursor: pointer;
    }

    .modal-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.85);
        z-index: 9999;
    }

    .modal-content {
        background: white;
        width: 95%;
        max-width: 1200px;
        margin: 2vh auto;
        border-radius: 12px;
        height: 92vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }

    .modal-header {
        padding: 15px 20px;
        border-bottom: 1px solid #eee;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .modal-body {
        padding: 20px;
        overflow-y: auto;
        flex-grow: 1;
    }

    .modal-footer {
        padding: 15px 20px;
        border-top: 1px solid #eee;
        display: flex;
        justify-content: flex-end;
        gap: 10px;
    }

    .details-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 30px;
    }

    .section-title {
        color: #4b6344;
        border-bottom: 2px solid #f0f0f0;
        padding-bottom: 8px;
        margin-bottom: 15px;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .data-row {
        margin-bottom: 8px;
        font-size: 0.9rem;
        padding-bottom: 4px;
        border-bottom: 1px dashed #f9f9f9;
        display: flex;
    }

    .data-label {
        font-weight: 600;
        color: #777;
        width: 160px;
        flex-shrink: 0;
    }

    .doc-group {
        margin-bottom: 20px;
        border: 1px solid #f0f0f0;
        padding: 10px;
        border-radius: 8px;
        background: #fff;
    }

    .doc-img {
        width: 100%;
        border-radius: 6px;
        border: 1px solid #ddd;
        margin-top: 8px;
        cursor: pointer;
        background: #fafafa;
        object-fit: contain;
        max-height: 280px;
    }

    .thumb-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
    }

    .thumb-box {
        text-align: center;
        font-size: 0.75rem;
        color: #555;
        font-weight: 600;
    }

    .btn-approve {
        background: #28a745;
        color: white;
        border: none;
        padding: 12px 25px;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 600;
    }

    .btn-reject {
        background: #dc3545;
        color: white;
        border: none;
        padding: 12px 25px;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 600;
    }

    .btn-block {
        background: #333;
        color: white;
        border: none;
        padding: 12px 25px;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 600;
    }

    .processing-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(255, 255, 255, 0.9);
        z-index: 10001;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
    }

    .spinner {
        width: 50px;
        height: 50px;
        border: 5px solid #f3f3f3;
        border-top: 5px solid #4b6344;
        border-radius: 50%;
        animation: spin 1s linear infinite;
    }

    @keyframes spin {
        0% {
            transform: rotate(0deg);
        }

        100% {
            transform: rotate(360deg);
        }
    }

    .close-btn {
        font-size: 30px;
        cursor: pointer;
        color: #999;
        line-height: 1;
    }
</style>

<script>
    var currentId = null;

    function resolveImg(url) {
        return url && typeof url === 'string' && url.startsWith('http')
            ? url
            : 'https://via.placeholder.com/400x300?text=Image+Not+Found';
    }

    async function loadKycQueue() {
        const tableBody = document.getElementById('kyc-table-body');
        try {
            const snap = await db.collection('kyc').doc('categories').get();
            const pending = snap.data()?.pending || [];
            tableBody.innerHTML = pending.length ? "" : "<tr><td colspan='3' style='text-align:center;'>No pending requests.</td></tr>";

            pending.forEach(id => {
                tableBody.innerHTML += `
                    <tr>
                        <td><b>${id}</b></td>
                        <td><span style="color:#ef6c00; font-weight:600;">Pending Review</span></td>
                        <td><button onclick="reviewUser('${id}')" style="background:#4b6344; color:white; border:none; padding:6px 12px; border-radius:4px; cursor:pointer;">Review Details</button></td>
                    </tr>`;
            });
        } catch (e) { tableBody.innerHTML = "Error loading list."; }
    }

    async function reviewUser(id) {
        currentId = id;
        const loader = document.getElementById('processing-loader');
        loader.style.display = 'flex';

        try {
            const doc = await db.collection('users').doc(id).get();
            if (!doc.exists) throw new Error("User record not found.");
            const u = doc.data();

            const pInfo = u.personalInfo || {};
            const kInfo = u.personKycInfo || {};
            const vInfo = u.vehicleKycInfo || {};
            const vImgs = vInfo.vehicleImages || {};

            document.getElementById('view-name').innerText = u.fullName || id;

            // --- 1. PERSONAL DETAILS ---
            document.getElementById('personal-details-area').innerHTML = `
                <div class="data-row"><span class="data-label">Full Name:</span> <b>${u.fullName || 'N/A'}</b></div>
                <div class="data-row"><span class="data-label">Mobile:</span> <span>${u.mobile || id}</span></div>
                <div class="data-row"><span class="data-label">DOB:</span> <span>${pInfo.dob || 'N/A'}</span></div>
                <div class="data-row"><span class="data-label">Gender:</span> <span>${pInfo.gender || 'N/A'}</span></div>
            `;

            // --- 2. ADDRESS & LOCATION ---
            document.getElementById('address-details-area').innerHTML = `
                <div class="data-row"><span class="data-label">City:</span> <span>${pInfo.userCity || 'N/A'}</span></div>
                <div class="data-row"><span class="data-label">Pincode:</span> <span>${pInfo.pin || 'N/A'}</span></div>
                <div class="data-row"><span class="data-label">Address:</span> <span>${pInfo.address || 'N/A'}</span></div>
            `;

            // --- 3. IDENTITY DOCUMENTS ---
            document.getElementById('id-docs-area').innerHTML = `
                <div class="doc-group">
                    <div class="data-row"><span class="data-label">Selfie:</span></div>
                    <img src="${resolveImg(kInfo.selfieUrl)}" class="doc-img" onclick="window.open(this.src)">
                </div>
                <div class="doc-group">
                    <div class="data-row"><span class="data-label">Aadhaar Card:</span> <span>${kInfo.aadhaar || 'N/A'}</span></div>
                    <img src="${resolveImg(kInfo.aadhaarDocUrl)}" class="doc-img" onclick="window.open(this.src)">
                </div>
                <div class="doc-group">
                    <div class="data-row"><span class="data-label">PAN Card:</span> <span>${kInfo.pan || 'N/A'}</span></div>
                    <img src="${resolveImg(kInfo.panDocUrl)}" class="doc-img" onclick="window.open(this.src)">
                </div>
                <div class="doc-group">
                    <div class="data-row"><span class="data-label">Driving License:</span> <span>${kInfo.drivingLicense || 'N/A'}</span></div>
                    <img src="${resolveImg(kInfo.drivingLicenseDocUrl)}" class="doc-img" onclick="window.open(this.src)">
                </div>
            `;

            // --- 4. VEHICLE REGISTRATION ---
            document.getElementById('vehicle-details-area').innerHTML = `
                <div class="data-row"><span class="data-label">Vehicle:</span> <b>${vInfo.vehicleCompany} ${vInfo.vehicleModel}</b></div>
                <div class="data-row"><span class="data-label">Type:</span> <span>${vInfo.vehicleType}</span></div>
                <div class="data-row"><span class="data-label">Fuel/Mileage:</span> <span>${vInfo.fuelType} / ${vInfo.mileage} kmpl</span></div>
                <div class="doc-group">
                    <div class="data-row"><span class="data-label">RC Number:</span> <b>${vInfo.rcNumber || 'N/A'}</b></div>
                    <img src="${resolveImg(vInfo.rcDocUrl)}" class="doc-img" onclick="window.open(this.src)">
                </div>
                <div class="doc-group">
                    <div class="data-row"><span class="data-label">Number Plate:</span></div>
                    <img src="${resolveImg(vInfo.numberPlateUrl)}" class="doc-img" onclick="window.open(this.src)">
                </div>
                <div class="data-row"><b>Visuals:</b></div>
                <div class="thumb-grid">
                    <div class="thumb-box"><img src="${resolveImg(vImgs.front)}" class="doc-img" onclick="window.open(this.src)"><span>Front</span></div>
                    <div class="thumb-box"><img src="${resolveImg(vImgs.back)}" class="doc-img" onclick="window.open(this.src)"><span>Back</span></div>
                    <div class="thumb-box"><img src="${resolveImg(vImgs.side)}" class="doc-img" onclick="window.open(this.src)"><span>Side</span></div>
                </div>
            `;

            // --- 5. DYNAMIC OWNERSHIP SECTION ---
            let ownershipHtml = `<div class="data-row"><span class="data-label">Ownership Type:</span> <b>${vInfo.ownershipType || 'N/A'}</b></div>`;

            if (vInfo.ownershipType === "Family/Friends" && vInfo.familyInfo) {
                const f = vInfo.familyInfo;
                ownershipHtml += `
                    <div class="data-row"><span class="data-label">Owner Name:</span> <span>${f.ownerName}</span></div>
                    <div class="data-row"><span class="data-label">Relation:</span> <span>${f.relationType}</span></div>
                    <div class="data-row"><span class="data-label">Owner Aadhaar:</span> <span>${f.ownerAadhar}</span></div>
                    <div class="data-row"><span class="data-label">Consent Given:</span> <span>${f.ownerConsent ? '✅ Yes' : '❌ No'}</span></div>
                `;
            } else if (vInfo.ownershipType === "Rental" && vInfo.rentalInfo) {
                const r = vInfo.rentalInfo;
                ownershipHtml += `
                    <div class="data-row"><span class="data-label">Rental Company:</span> <span>${r.rentalCompany}</span></div>
                    <div class="data-row"><span class="data-label">Owner Name:</span> <span>${r.rentalOwner}</span></div>
                    <div class="data-row"><span class="data-label">Owner Phone:</span> <span>${r.rentalPhone}</span></div>
                    <div class="data-row"><span class="data-label">Rent Due Date:</span> <span>${r.rentDueDate}</span></div>
                    <div class="doc-group" style="margin-top:10px;">
                        <div class="data-row"><span class="data-label">Rental Agreement:</span></div>
                        <img src="${resolveImg(r.rentalDocUrl)}" class="doc-img" onclick="window.open(this.src)">
                    </div>
                `;
            } else {
                ownershipHtml += `<div class="data-row"><span class="data-label">Detail:</span> <span>Self Owned Vehicle</span></div>`;
            }
            document.getElementById('ownership-details-area').innerHTML = ownershipHtml;

            // --- 6. STATUS ---
            document.getElementById('status-details-area').innerHTML = `
                <div class="data-row"><span class="data-label">Personal KYC:</span> <span>${u.personalKycSubmitted ? '✅ YES' : '❌ NO'}</span></div>
                <div class="data-row"><span class="data-label">Vehicle KYC:</span> <span>${u.vehicleKycSubmitted ? '✅ YES' : '❌ NO'}</span></div>
                <div class="data-row"><span class="data-label">Last Updated:</span> <span>${new Date(u.updatedAt).toLocaleString()}</span></div>
            `;

            document.getElementById('review-modal').style.display = 'block';
        } catch (err) {
            console.error(err);
            alert("Error loading data.");
        } finally {
            loader.style.display = 'none';
        }
    }

    function closeModal() { document.getElementById('review-modal').style.display = 'none'; }

    async function processAction(status, reason = "") {
        const admin = localStorage.getItem('activeAdmin') || "Admin";
        const loader = document.getElementById('processing-loader');
        loader.style.display = 'flex';
        try {
            const batch = db.batch();
            const catRef = db.collection('kyc').doc('categories');
            const userRef = db.collection('users').doc(currentId);
            batch.update(catRef, { pending: firebase.firestore.FieldValue.arrayRemove(currentId), [status]: firebase.firestore.FieldValue.arrayUnion(`${currentId} (${admin})`) });
            batch.update(userRef, { kycStatus: status, kycReason: reason, verifiedBy: admin, verifiedAt: firebase.firestore.Timestamp.now() });
            await batch.commit();
            loader.style.display = 'none';
            closeModal();
            loadKycQueue();
        } catch (e) { loader.style.display = 'none'; alert("Failed: " + e.message); }
    }

    function confirmUpdate(s) { if (confirm("Approve this rider?")) processAction(s); }
    function rejectWithReason(s) { const r = prompt("Reason:"); if (r) processAction(s, r); }

    loadKycQueue();
</script>
