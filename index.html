<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Olive Pro | Admin Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --olive-dark: #4b6344;
            --bg-gray: #f4f7f6;
        }

        body {
            background-color: var(--bg-gray);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .auth-container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-card {
            width: 100%;
            max-width: 420px;
            padding: 2.5rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            background: white;
        }

        .hidden {
            display: none;
        }

        .logo-area {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-area i {
            font-size: 3rem;
            color: var(--olive-dark);
            margin-bottom: 10px;
        }

        .logo-area h2 {
            color: #333;
            margin: 0;
        }

        .input-group {
            margin-bottom: 1.2rem;
            position: relative;
        }

        .input-group i {
            position: absolute;
            left: 12px;
            top: 38px;
            color: #888;
        }

        input,
        select {
            width: 100%;
            padding: 12px 12px 12px 35px;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-top: 8px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        select {
            padding-left: 12px;
            cursor: pointer;
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: var(--olive-dark);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            margin-top: 1rem;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background: #3a4d35;
            transform: translateY(-1px);
        }

        .error-msg {
            color: #d9534f;
            background: #fdf7f7;
            padding: 10px;
            border-radius: 5px;
            font-size: 0.85rem;
            margin-top: 15px;
            display: none;
            text-align: center;
            border: 1px solid #ebccd1;
        }

        .loading-spinner {
            display: none;
            margin-left: 10px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <div class="auth-container">
        <div class="auth-card" id="step-login">
            <div class="logo-area">
                <i class="fas fa-shield-halved"></i>
                <h2>Happy Rider</h2>
                <p style="color: #777;">Secure Admin Access</p>
            </div>

            <div class="input-group">
                <label style="font-weight: 600; font-size: 0.9rem;">Username</label>
                <i class="fas fa-user"></i>
                <input type="text" id="username" placeholder="Enter admin username">
            </div>

            <div class="input-group">
                <label style="font-weight: 600; font-size: 0.9rem;">Password</label>
                <i class="fas fa-lock"></i>
                <input type="password" id="password" placeholder="Enter password">
            </div>

            <button class="btn-primary" id="login-btn" onclick="handleAuth()">
                Verify Credentials <i class="fas fa-arrow-right" style="margin-left: 8px;"></i>
            </button>

            <div id="error-login" class="error-msg"></div>
        </div>

        <div class="auth-card hidden" id="step-names">
            <div class="logo-area">
                <i class="fas fa-user-check"></i>
                <h2>Identity Check</h2>
                <p style="color: #777;">Select your name to continue</p>
            </div>

            <div class="input-group">
                <label style="font-weight: 600; font-size: 0.9rem;">Select Admin Name</label>
                <select id="admin-name-dropdown"></select>
            </div>

            <button class="btn-primary" onclick="finalizeLogin()">
                Enter Dashboard <i class="fas fa-circle-check" style="margin-left: 8px;"></i>
            </button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        // Your Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyB70UjTr_WOYq4OlYmgAJVfCf1oQkEEaeM",
            authDomain: "happy-rider-crew.firebaseapp.com",
            projectId: "happy-rider-crew",
            storageBucket: "happy-rider-crew.firebasestorage.app",
            messagingSenderId: "403395081239",
            appId: "1:403395081239:web:9ee0af1fce47cb28969852",
            measurementId: "G-PN2TZ0P91N"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function handleAuth() {
            const userIn = document.getElementById('username').value.trim();
            const passIn = document.getElementById('password').value.trim();
            const errorDiv = document.getElementById('error-login');
            const loginBtn = document.getElementById('login-btn');

            if (!userIn || !passIn) {
                showError("Please enter both username and password.");
                return;
            }

            // UI Feedback
            loginBtn.disabled = true;
            loginBtn.innerHTML = 'Verifying... <i class="fas fa-spinner fa-spin" style="margin-left:8px;"></i>';
            errorDiv.style.display = 'none';

            try {
                // Fetch credentials from Firestore: Collection 'kyc', Document 'admins'
                const docRef = db.collection('kyc').doc('admins');
                const doc = await docRef.get();

                if (doc.exists) {
                    const data = doc.data();

                    if (userIn === data.username && passIn === data.password) {
                        // Success: Show Name Selection Step
                        document.getElementById('step-login').classList.add('hidden');
                        document.getElementById('step-names').classList.remove('hidden');

                        const dropdown = document.getElementById('admin-name-dropdown');
                        dropdown.innerHTML = ""; // Clear

                        // Populate names from the array in Firestore
                        if (data.adminNames && Array.isArray(data.adminNames)) {
                            data.adminNames.forEach(name => {
                                let opt = document.createElement('option');
                                opt.value = name;
                                opt.textContent = name;
                                dropdown.appendChild(opt);
                            });
                        }
                    } else {
                        showError("Incorrect username or password.");
                    }
                } else {
                    showError("Database configuration error: 'kyc/admins' not found.");
                }
            } catch (error) {
                console.error("Firestore Error:", error);
                showError("Connection failed. Check your internet or Firestore rules.");
            } finally {
                loginBtn.disabled = false;
                loginBtn.innerHTML = 'Verify Credentials <i class="fas fa-arrow-right" style="margin-left: 8px;"></i>';
            }
        }

        function showError(msg) {
            const errorDiv = document.getElementById('error-login');
            errorDiv.innerText = msg;
            errorDiv.style.display = 'block';
        }

        function finalizeLogin() {
            const selectedName = document.getElementById('admin-name-dropdown').value;
            if (selectedName) {
                // Store the selected admin name in localStorage
                localStorage.setItem('activeAdmin', selectedName);
                // Move to main dashboard
                window.location.href = 'main.html';
            }
        }

        // Allow pressing "Enter" to login
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !document.getElementById('step-login').classList.contains('hidden')) {
                handleAuth();
            }
        });
    </script>
</body>

</html>
